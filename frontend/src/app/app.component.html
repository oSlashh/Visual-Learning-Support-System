<div class="app-layout">
  <!-- Top sleek header status badge -->
  <header class="app-header">
    <div class="connection-badge" [class]="status()" (click)="checkBackendHealth()">
      <span class="status-indicator"></span>
      <span class="status-text">
        @switch (status()) {
          @case ('connecting') { API: Checking... }
          @case ('connected') { API Connected }
          @case ('error') { API Disconnected }
        }
      </span>
      @if (status() === 'connected') {
        <span class="badge-version">v{{ version() }}</span>
      }
    </div>
  </header>

  <!-- Main viewport content -->
  <main class="app-main">
    <app-home></app-home>
  </main>
</div>
