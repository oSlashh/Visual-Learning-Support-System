<div class="container">
  <div class="card">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1 class="title">Blend</h1>
    </div>
    <p class="subtitle">AI-powered Study Companion</p>
    
    <div class="divider"></div>
    
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">Backend Status</span>
        <div class="status-value">
          <span class="indicator-dot" [class]="status()"></span>
          @switch (status()) {
            @case ('connecting') { <span>Connecting...</span> }
            @case ('connected') { <span class="connected-text">Connected</span> }
            @case ('error') { <span class="disconnected-text">Disconnected</span> }
          }
        </div>
      </div>
      
      @if (status() === 'connected') {
        <div class="status-row">
          <span class="status-label">Backend Version</span>
          <span class="status-value version-number">{{ version() }}</span>
        </div>
      }
    </div>
    
    <div class="actions">
      <button class="btn-refresh" (click)="checkBackendHealth()" [disabled]="status() === 'connecting'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon" [class.spinning]="status() === 'connecting'">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Re-check Connection
      </button>
    </div>
  </div>
</div>
